<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Presensi Sekolah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Aplikasi Presensi Sekolah</h1>
            <p>SMK Negeri 1 Contoh</p>
        </header>

        <div class="main-content">
            <!-- Form Presensi -->
            <div class="card">
                <h2>Form Presensi</h2>
                <form id="presensiForm">
                    <div class="form-group">
                        <label for="nama">Nama Lengkap</label>
                        <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
                    </div>

                    <div class="form-group">
                        <label for="kelas">Kelas</label>
                        <select id="kelas" required>
                            <option value="">Pilih Kelas</option>
                            <option value="X RPL 1">X RPL 1</option>
                            <option value="X RPL 2">X RPL 2</option>
                            <option value="XI RPL 1">XI RPL 1</option>
                            <option value="XI RPL 2">XI RPL 2</option>
                            <option value="XII RPL 1">XII RPL 1</option>
                            <option value="XII RPL 2">XII RPL 2</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" required>
                            <option value="">Pilih Status</option>
                            <option value="Hadir">✅ Hadir</option>
                            <option value="Sakit">🤒 Sakit</option>
                            <option value="Izin">📝 Izin</option>
                            <option value="Alpha">❌ Alpha</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="keterangan">Keterangan (Opsional)</label>
                        <textarea id="keterangan" rows="3" placeholder="Tambahkan keterangan jika diperlukan"></textarea>
                    </div>

                    <button type="submit" class="btn-primary">Simpan Presensi</button>
                </form>
            </div>

            <!-- Tabel Presensi -->
            <div class="card">
                <h2>Data Presensi Hari Ini</h2>
                <div id="loadingData" class="loading">Memuat data...</div>
                <div id="tableContainer">
                    <table id="presensiTable">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Nama</th>
                                <th>Kelas</th>
                                <th>Status</th>
                                <th>Keterangan</th>
                                <th>Waktu</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="6" class="text-center">Belum ada data presensi</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <button id="refreshData" class="btn-secondary">🔄 Refresh Data</button>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Aplikasi Presensi Sekolah</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
